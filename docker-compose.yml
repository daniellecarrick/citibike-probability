services:
  collector:
    build: ./collector
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/citibike.db
    restart: unless-stopped

  backend:
    build: ./backend
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/citibike.db
    ports:
      - "8000:8000"
    depends_on:
      - collector

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_MAPBOX_TOKEN=${MAPBOX_TOKEN}
